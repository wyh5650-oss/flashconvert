# 双平台打包：Windows（NSIS+便携版）与 macOS（DMG+ZIP，arm64/x64）
# 触发：手动 Run workflow，或推 v* 标签（标签触发时自动附到 GitHub Release）
name: build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.blockmap
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "闪转 ${GITHUB_REF_NAME}" --notes "Apple 风格的本地文件格式转换器。Windows 安装版/便携版与 macOS DMG 见下方附件。" || true
          gh release upload "${GITHUB_REF_NAME}" dist/*.exe --clobber

  macos:
    runs-on: macos-latest
    env:
      # 无签名证书时跳过 codesign（本地分发够用；上架需开发者证书）
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.dmg
            dist/*.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "闪转 ${GITHUB_REF_NAME}" --notes "Apple 风格的本地文件格式转换器。Windows 安装版/便携版与 macOS DMG 见下方附件。" || true
          gh release upload "${GITHUB_REF_NAME}" dist/*.dmg dist/*.zip --clobber
